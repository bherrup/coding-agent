services:
  fleet-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Docker Socket Passthrough for gitlab-ci-local / DinD
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent Workspace
      - ./local-workspace/sessions:/workspace/sessions
      - ./local-workspace/data:/workspace/data
      - ./local-workspace/repos:/workspace/repos
      # Configuration & Prompts (Development)
      - ./app:/home/agent/app
      - ./fleet_config.json:/workspace/fleet_config.json:ro
      - ./prompts:/workspace/prompts:ro
      - ./FLEET_AGENT.md:/workspace/GEMINI.md:ro
      - ./scripts:/workspace/scripts:ro
    environment:
      # AWS Mock/Local Env
      - CDK_ENV=local
      - MAX_TOKENS=2000000
      - AGENT_TIMEOUT=1800
      - BOT_USER_ID=U12345678 # Mock Bot ID
      - DB_PATH=/workspace/data/fleet.db

      # Robyn Health Check Server Port
      - PORT=8080
      
      # REQUIRED SECRETS (Provide these in a local .env file)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GH_TOKEN}

      # OPTIONAL MCP SECRETS
      - GITLAB_PAT=${GITLAB_PAT}
      - GITLAB_URL=${GITLAB_URL}
      - SENTRY_TOKEN=${SENTRY_TOKEN}
      - ASANA_PAT=${ASANA_PAT}
      - STITCH_API_KEY=${STITCH_API_KEY}

    # Ensure the container stays alive or starts the bridge
    restart: unless-stopped

  fleet-headless:
    build:
      context: .
      dockerfile: Dockerfile.headless
    stdin_open: true # Equivalent to -i
    tty: true        # Equivalent to -t
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./local-workspace/sessions:/workspace/sessions
      - ./local-workspace/data:/workspace/data
      - ./local-workspace/repos:/workspace/repos
      - ./app:/home/agent/app
      - ./scripts:/workspace/scripts:ro
      # We let the entrypoint handle .gemini and other resources
      # No need for redundant mounts that cause skill conflicts
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITLAB_PAT=${GITLAB_PAT}
      - GITLAB_TOKEN=${GITLAB_PAT}
      - GITLAB_PERSONAL_ACCESS_TOKEN=${GITLAB_PAT}
      - GITLAB_URL=${GITLAB_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
      - SENTRY_TOKEN=${SENTRY_TOKEN}
      - ASANA_PAT=${ASANA_PAT}
      - STITCH_API_KEY=${STITCH_API_KEY}
      - MAX_TOKENS=2000000
      - AGENT_TIMEOUT=1800

networks:
  default:
    name: fleet-network
